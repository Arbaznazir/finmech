services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finmech-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/finmech?schema=public}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-https://finmech.co}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      - RAZORPAY_COMPANY_NAME=${RAZORPAY_COMPANY_NAME:-FinMech}
    volumes:
      - backend-data:/app/data
    networks:
      - finmech-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  finmech-net:
    name: finmech-net

volumes:
  backend-data:
